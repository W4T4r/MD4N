patch:
  # Start from the upstream rime-ice defaults, then keep the shared schema
  # list focused and add a couple of ergonomic overrides.
  __include: rime_ice_suggestion:/

  schema_list:
    - schema: rime_ice
    - schema: double_pinyin
    - schema: double_pinyin_flypy
    - schema: double_pinyin_mspy

  "menu/page_size": 7

  "key_binder/bindings/+":
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
